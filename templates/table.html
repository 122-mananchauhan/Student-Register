<!DOCTYPE html>
<html>
<head>
    <title>All Users</title>
    <style>
        table {
            border-collapse: collapse;
            width: 70%;
            margin: auto;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: lightgreen;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">All Registered Users</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Email</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{ user['id'] }}</td>
        <td>{{ user['username'] }}</td>
        <td>{{ user['email'] }}</td>
    </tr>
    {% endfor %}
</table>

<br><br>
<div style="text-align:center;">
    <a href="/dashboard">Back to Dashboard</a>
</div>

</body>
</html>
