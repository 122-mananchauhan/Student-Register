{% extends "base.html" %}

{% block title %}
Register | Student Register
{% endblock %}

{% block content %}

<!-- CSS & Fonts -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">

<div id="three-container"></div>

<div class="ui-wrapper">
    <div class="register-box">
        <div class="text-center">
            <h3>Register</h3>
            <span class="subtitle">Access the platform</span>
        </div>

        <form id="registerForm" method="POST">

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="johndoe_dev" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="name@company.com" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Create Password</label>
                <div class="password-wrapper">
                    <input type="password" name="password" class="form-control" required>
                    <i class="bi bi-eye toggle-password" id="eyeIcon"></i>
                </div>
            </div>

            <button type="submit" class="btn btn-register w-100">
                Initialize Account
            </button>

        </form>

        <p class="text-center mt-4 mb-0" style="font-size: 0.9rem; color: #6b7280;">
            Already verified?
            <a href="{{ url_for('login') }}" class="login-link">Sign In</a>
        </p>
    </div>
</div>

{% endblock %}
