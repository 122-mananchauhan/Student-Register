<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>

<div class="dashboard-container">

    <!-- Header -->
    <div class="header">
        <h1>Welcome, {{ username }} </h1>

        <!-- Profile Section -->
        <div class="profile-section">

            <!-- ✅ FIXED IMAGE DISPLAY -->
            <img 
                src="{{ url_for('static', filename='uploads/' + pfp) if pfp else url_for('static', filename='uploads/default.png') }}"
                alt="Profile Picture"
                class="profile-pic"
                onerror="this.onerror=null; this.src='{{ url_for('static', filename='uploads/default.png') }}';"
            >

            <!-- Upload Form -->
            <form action="/upload_pfp" method="POST" enctype="multipart/form-data">
                <input type="file" name="pfp" accept="image/*" required>
                <button type="submit">Upload</button>
            </form>

        </div>

        <a href="/logout" class="logout-btn">Logout</a>
    </div>

    <!-- Main Content -->
    <div class="card">
        <h2>Student Dashboard</h2>
        <p>Access your academic information below</p>

        <a href="/result" class="btn">View Result</a>
    </div>

</div>

</body>
</html>
